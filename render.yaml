services:
  - type: web
    name: paperpilot-backend
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
